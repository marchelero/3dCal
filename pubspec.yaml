name: tresdcal
description: "Calculadora de precios para impresiones 3D. 100% local, mobile + web."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cupertino_icons: ^1.0.8
  decimal: ^3.0.2
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.4
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.3.2
  share_plus: ^10.1.4
  image_gallery_saver: ^2.0.3
  image_picker: ^1.1.2
  sqlite3_flutter_libs: ^0.5.24
  pdf: ^3.13.0
  printing: ^5.13.2

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.6
  drift_dev: ^2.18.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
